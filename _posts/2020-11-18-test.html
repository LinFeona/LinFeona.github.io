
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>表格工具</title>
    <link rel="stylesheet" href="../css/text.css">
    <style type="text/css">

            .FriedGoldenFlower{
            
            /* div的框*/
            border: 9px solid blue;
            /* 宽度*/
            width:  1200px;
            /* 颜色*/
            color: yellow;
            /* 高度*/
            height: 300px;
            
            /* 字体大小*/
            font-size: 30px;
            /* 字体布局*/
            text-align: right;
            /* 背景图片*/
            background:url('../image/D1.PNG') no-repeat;
            background-size: cover;
            /* 透明度  */
            opacity: 0.6;

        }
        .fightagainstlandlords{
            border: 6px solid red;
            color: black;
            width:  590px;
            font-size:20px;
            height: 150px;
            float: left;
            margin-right: 15px;
            text-align: right;
            margin-top: 15px;
           
        }
        .horseracing{
            border: 6px solid red;
            color: yellow;
            width: 590px;
            height: 150px;
            font-size: 18px;
            text-align: right;
            margin-top: 15px;
            float: left;
           
            
        }
        .Guangdongmahjong{

            border: 9px solid blue;
            width:  1200px;
            height: 300px;
            float: left;
            font-size: 30px;
            margin-top: 15px;
            text-align: right;
            color: yellow;
            

            
        }
        body{
              
            
            font-family:黑体;


        }
    </style>
</head>
<body>
  
    <div class="FriedGoldenFlower" > 
        
        
        <h1>顶端</h1>
        
    </div>



    <div class="fightagainstlandlords" > 
        <h1>中间 左边</h1>
       
    </div>


    <div class="horseracing" > 
        <h1>中间右边</h1>
       
    </div>


    <div class="Guangdongmahjong" > 
        <h1>底部</h1>
       
    </div>

</body>
</html>
